name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  php-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.3', '8.4']
    name: PHP ${{ matrix.php }} tests
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none
      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress
      - name: PHPUnit
        run: vendor/bin/phpunit

  php-quality:
    runs-on: ubuntu-latest
    name: Pint + PHPStan
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none
      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress
      - name: Pint (test mode)
        run: vendor/bin/pint --test
      - name: PHPStan
        run: vendor/bin/phpstan analyse --no-progress --memory-limit=1G

  frontend:
    runs-on: ubuntu-latest
    name: Typecheck + Vitest + build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Vitest
        run: npm run test
      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    name: Playwright e2e
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - name: Install Playwright browsers
        run: npm run e2e:install
      - name: Playwright
        run: npm run e2e
